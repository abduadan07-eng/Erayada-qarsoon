<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciyaarta Erayada Qarsoon (Scores & Rounds)</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #fff; text-align: center; padding: 15px; margin: 0; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 95%; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #2f2f2f; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #2a2a2a; color: white; border: 1px solid #444; }
        button { background: #28a745; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .hidden { display: none; }
        .status { color: #ffc107; font-weight: bold; margin-top: 15px; font-size: 14px; }
        .room-title { color: #007bff; font-size: 24px; font-weight: bold; }
        
        /* Scoreboard CSS */
        .scoreboard { display: flex; justify-content: space-between; background: #2a2a2a; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; font-weight: bold; }
        .score-box { color: #28a745; }

        /* Qaybta Chat-ka */
        #chat-box { background: #121212; height: 180px; overflow-y: auto; border-radius: 8px; border: 1px solid #333; padding: 10px; margin-top: 15px; text-align: left; }
        .msg { margin-bottom: 8px; font-size: 14px; padding: 6px 10px; border-radius: 6px; display: inline-block; max-width: 85%; }
        .msg.me { background: #007bff; color: white; float: right; clear: both; }
        .msg.opponent { background: #333; color: white; float: left; clear: both; }
        .msg.system { background: #ffc107; color: black; float: none; display: block; text-align: center; margin: 5px auto; }
    </style>
</head>
<body>

    <h2 style="margin-top: 20px;">Ciyaarta Erayada Qarsoon 🎮</h2>

    <div id="lobby-screen" class="box">
        <h3>Ku Biir ama Samee Qol</h3>
        <button onclick="createRoom()">Abuur Qol Cusub (Create)</button>
        <div style="margin: 15px 0; color: #888;">— AMA —</div>
        <input type="number" id="room-code-input" pattern="\d*" placeholder="Geli Koodka Qolka (Tusaale: 4532)">
        <button onclick="joinRoom()" style="background: #007bff;">Ku Biir Qolka (Join)</button>
    </div>

    <div id="game-setup-screen" class="box hidden">
        <h3>Qolka: <span id="current-room-id" class="room-title">----</span></h3>
        <p>Qor erayga aad rabto inaad ka qariso saaxiibkaa!</p>
        <input type="text" id="secret-word-input" placeholder="Tusaale: Ronaldo, Messi, Laptop...">
        <button onclick="submitSecretWord()">Xaree Erayga</button>
        <div id="status-msg" class="status">Kula xiriiraya server-ka...</div>
    </div>

    <div id="gameplay-screen" class="box hidden">
        <div class="scoreboard">
            <div>Adiga: <span id="my-score" class="score-box">0</span></div>
            <div>Wareegga: <span id="round-number" style="color: #ffc107;">1</span></div>
            <div>Saaxiibkaa: <span id="opponent-score" class="score-box">0</span></div>
        </div>

        <p id="game-instruction" style="font-size: 14px; color: #aaa;">U sheeg saaxiibkaa tilmaam ka caawisa inuu helo eraygaaga.</p>
        
        <div id="chat-box">
            <div class="msg system">Wareeggii 1-aad wuxuu u bilaamay si rasmi ah!</div>
        </div>

        <div id="input-area" style="display: flex; gap: 8px; margin-top: 10px;">
            <input type="text" id="chat-input" placeholder="Qor fariin ama mala-awaalka..." style="flex: 4; margin: 0;">
            <button onclick="sendChatMessage()" style="flex: 1; margin: 0; background: #007bff;">Dir</button>
        </div>

        <button id="next-round-btn" onclick="startNextRound()" style="background: #ffc107; color: black; display: none; margin-top: 15px;">Wareegga Xiga (Next Round) ➡️</button>
    </div>

    <script>
        let pubnub;
        let myRoomCode = "";
        let myPlayerId = "player_" + Math.floor(Math.random() * 1000);
        let mySecretWord = "";
        let opponentWord = "";
        let myWordSubmitted = false;
        
        let myScore = 0;
        let opponentScore = 0;
        let currentRound = 1;
        let isRoundOver = false;

        // Init PubNub
        function initPubNub(roomCode) {
            pubnub = new PubNub({
                publishKey: 'pub-c-9c765955-4424-4f51-b0e5-7ec5488eb7e9', // Demo keys
                subscribeKey: 'sub-c-1123f1e1-e123-11e9-a316-02bf1c94a9bf',
                uuid: myPlayerId
            });

            pubnub.subscribe({ channels: [roomCode] });

            pubnub.addListener({
                message: function(event) {
                    let data = event.message;
                    
                    // 1. Markay erayada isweydaarsanayaan
                    if (data.type === "SUBMIT_WORD" && data.sender !== myPlayerId) {
                        opponentWord = data.word.toLowerCase();
                        checkGameStatus();
                    }

                    // 2. Markay fariimaha caadiga ah isweydaarsanayaan
                    if (data.type === "CHAT_MSG") {
                        appendMessage(data.text, data.sender === myPlayerId ? 'me' : 'opponent');
                    }

                    // 3. Marka qof uu guuleysto (Score Update)
                    if (data.type === "ROUND_WINNER") {
                        isRoundOver = true;
                        document.getElementById('input-area').style.display = 'none'; // Qari qoraalka
                        document.getElementById('next-round-btn').style.display = 'block'; // Muuji badanka xiga
                        
                        if (data.winner === myPlayerId) {
                            myScore++;
                            document.getElementById('my-score').innerText = myScore;
                            appendMessage(`🎉 Waad guuleysatay! Waxaad heshay eraygii ahaa: [${opponentWord.toUpperCase()}]`, 'system');
                        } else {
                            opponentScore++;
                            document.getElementById('opponent-score').innerText = opponentScore;
                            appendMessage(`😢 Saaxiibkaa ayaa dhibicda helay! Wuxuu gartay eraygaagii oo ahaa: [${mySecretWord.toUpperCase()}]`, 'system');
                        }
                    }

                    // 4. Marka loo gudbayo wareegga cusub
                    if (data.type === "RESET_ROUND") {
                        resetRoundVariables();
                    }
                }
            });
        }

        function createRoom() {
            myRoomCode = "room_" + Math.floor(1000 + Math.random() * 9000);
            showSetupScreen(myRoomCode.replace("room_", ""));
            initPubNub(myRoomCode);
            document.getElementById('status-msg').innerText = "Qolka waa diyaar. Koodka u dir saaxiibkaa.";
        }

        function joinRoom() {
            let code = document.getElementById('room-code-input').value.trim();
            if (!code) return alert("Fadlan geli koodka qolka!");
            
            myRoomCode = "room_" + code;
            showSetupScreen(code);
            initPubNub(myRoomCode);
            document.getElementById('status-msg').innerText = "Waa ku biirtay qolka. Qor eraygaaga.";
        }

        function showSetupScreen(code) {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-setup-screen').classList.remove('hidden');
            document.getElementById('current-room-id').innerText = code;
        }

        function submitSecretWord() {
            let word = document.getElementById('secret-word-input').value.trim();
            if (!word) return alert("Fadlan qor erayga aad qarinayso!");

            mySecretWord = word.toLowerCase();
            myWordSubmitted = true;
            document.getElementById('status-msg').innerText = "Eraygaaga waad xaraysay! Sugaya saaxiibkaa...";
            
            pubnub.publish({
                channel: myRoomCode,
                message: { type: "SUBMIT_WORD", sender: myPlayerId, word: mySecretWord }
            });

            checkGameStatus();
        }

        function checkGameStatus() {
            if (myWordSubmitted && opponentWord !== "") {
                document.getElementById('game-setup-screen').classList.add('hidden');
                document.getElementById('gameplay-screen').classList.remove('hidden');
                document.getElementById('input-area').style.display = 'flex';
                document.getElementById('next-round-btn').style.display = 'none';
            }
        }

        function sendChatMessage() {
            if(isRoundOver) return;

            let inputEl = document.getElementById('chat-input');
            let text = inputEl.value.trim();
            if (!text) return;

            // 1. U dir fariinta caadiga ah qolka dhan
            pubnub.publish({
                channel: myRoomCode,
                message: { type: "CHAT_MSG", sender: myPlayerId, text: text }
            });

            // 2. Hubi haddii qofkani uu helay eraygii saxda ahaa
            if (text.toLowerCase() === opponentWord) {
                pubnub.publish({
                    channel: myRoomCode,
                    message: { type: "ROUND_WINNER", winner: myPlayerId }
                });
            }

            inputEl.value = "";
        }

        // Badanka Next Round marka la gujiyo
        function startNextRound() {
            pubnub.publish({
                channel: myRoomCode,
                message: { type: "RESET_ROUND" }
            });
        }

        // Dib u habaynta xogta wareegga cusub
        function resetRoundVariables() {
            mySecretWord = "";
            opponentWord = "";
            myWordSubmitted = false;
            isRoundOver = false;
            currentRound++;
            
            document.getElementById('round-number').innerText = currentRound;
            document.getElementById('secret-word-input').value = "";
            document.getElementById('status-msg').innerText = "Qor erayga wareegga cusub.";
            
            // Dib ugu celi bogga qarinta erayada
            document.getElementById('gameplay-screen').classList.add('hidden');
            document.getElementById('game-setup-screen').classList.remove('hidden');
            
            // Nadiifi chat-ka hore
            document.getElementById('chat-box').innerHTML = `<div class="msg system">Wareeggii ${currentRound}-aad ayaa bilaamay!</div>`;
        }

        function appendMessage(text, side) {
            let chatBox = document.getElementById('chat-box');
            let msgEl = document.createElement('div');
            msgEl.className = "msg " + side;
            msgEl.innerText = text;
            chatBox.appendChild(msgEl);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
